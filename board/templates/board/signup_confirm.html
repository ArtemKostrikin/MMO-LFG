{% extends 'base.html' %}

{% block content %}
<div class="text-center bg-slate-800 p-10 rounded-xl border border-slate-700 shadow-2xl">
    <div class="text-6xl mb-4">📧</div>
    <h1 class="text-3xl font-bold text-blue-400 mb-4">Проверьте почту</h1>
    <p class="text-slate-300 mb-6">Мы отправили вам письмо с кодом подтверждения. <br> Пожалуйста, введите его ниже, чтобы активировать аккаунт.</p>

    <form method="post" class="inline-block">
        {% csrf_token %}
        <input type="text" name="code" placeholder="Код из письма" class="bg-slate-900 border border-slate-700 p-3 rounded mr-2 text-white text-center tracking-widest font-bold">
        <button type="submit" class="bg-blue-600 px-6 py-3 rounded font-bold">Активировать</button>
    </form>
</div>
{% endblock %}
