{% extends 'base.html' %}

{% block content %}
<h1 class="text-3xl font-bold mb-6">Board Ads</h1>
<div class="grid gap-4">
    {% for post in posts %}
    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-md">
        <h2 class="text-2xl font-semibold mb-2">
            <a href="{% url 'post_detail' post.pk %}" class="text-blue-400 hover:underline">{{ post.title }}</a>
        </h2>
        <div class="flex items-center text-sm text-slate-400 mb-4">
            <span class="bg-slate-700 px-2 py-1 rounded text-blue-300 mr-3">{{ post.category.name }}</span>
            <span>Автор: {{ post.author.username }}</span>
        </div>
        <div class="text-slate-300">
            {{ post.text|safe|truncatewords:30 }}
        </div>
    </div>
    {% empty %}
    <p class="text-slate-500 text-center py-10">Объявлений пока нет. Будь первым!</p>
    {% endfor %}
</div>
{% endblock %}
