<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MMO LFG Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white"> <!-- Я чуть подправил цвета под темную тему, как на твоих скринах -->
    <nav class="bg-slate-800 p-4 border-b border-slate-700 shadow-lg">
        <div class="container mx-auto flex justify-between">
            <a href="{% url 'post_list' %}" class="font-bold text-xl text-blue-400">MMO-LFG</a>
            <div>
                {% if user.is_authenticated %}
                    <a href="{% url 'post_create' %}" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded">New Post</a>
                    <span class="ml-4">{{ user.username }}</span>
                {% else %}
                    <a href="/accounts/login/" class="hover:text-blue-400">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mx-auto mt-8 p-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
